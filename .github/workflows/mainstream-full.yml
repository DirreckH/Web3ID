name: Mainstream Full Suites

permissions: {}

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

env:
  FOUNDRY_PROFILE: ci

jobs:
  node-platform-full:
    name: Node full suites
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Proof smoke
        run: |
          pnpm proof:setup
          pnpm proof:smoke

      - name: Integration suite
        run: pnpm test:integration

      - name: System suite
        run: pnpm test:system

      - name: Mainstream full suite
        run: pnpm test:system:mainstream

      - name: Phase4 full suite
        run: pnpm test:phase4
